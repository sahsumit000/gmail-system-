{% extends "layout.html" %}
{% block content %}
<div class="compose-container">
    <h2>New Message</h2>
    <form id="compose-form">
        <div class="form-group">
            <input type="email" id="recipient" class="form-control" placeholder="To" required>
        </div>
        <div class="form-group">
            <input type="text" id="subject" class="form-control" placeholder="Subject">
        </div>
        <div class="form-group">
            <textarea id="body" class="form-control body-textarea" placeholder="Write your email here..."></textarea>
        </div>
        <div class="compose-actions">
            <button type="submit" class="btn-primary">Send</button>
            <button type="button" id="save-draft-btn" class="btn-secondary">Save Draft</button>
        </div>
    </form>
</div>
{% endblock %}
